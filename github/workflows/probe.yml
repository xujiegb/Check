name: probe dotnet sdk

on:
  workflow_dispatch:
  push:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10.0.1xx
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '10.0.1xx'

      - name: Show SDKs
        run: |
          echo "PATH=$PATH"
          which dotnet
          dotnet --info
          echo "---- SDK list ----"
          dotnet --list-sdks
          echo "---- Selected ----"
          dotnet --version
